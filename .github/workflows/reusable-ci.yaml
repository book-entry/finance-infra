name: Reusable — Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Verify Secret Length
        env:
          USER: ${{ secrets.PACKAGE_USER }}
          TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          echo "User string length: ${#USER}"
          echo "Token string length: ${#TOKEN}"
          if [ ${#TOKEN} -le 0 ]; then echo "ERROR: TOKEN IS EMPTY!"; exit 1; fi

      - name: Compile
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGE_USER }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: mvn compile --no-transfer-progress

  test:
    name: Test (JUnit)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Run JUnit tests
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGE_USER }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
