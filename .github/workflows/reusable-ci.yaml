name: Reusable — Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"
    secrets:
      server-username:
        required: true
      server-password:
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          # 這裡的 ID 必須與您 pom.xml 裡的 <repository><id>...</id></repository> 完全一致
          server-id: github
          # server-username / server-password 要填「環境變數名稱」，不是秘密值本身
          # setup-java 會產生 <username>${env.MAVEN_USERNAME}</username>，Maven 執行時再從環境變數解析
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Compile
        env:
          MAVEN_USERNAME: ${{ secrets.server-username }}
          MAVEN_PASSWORD: ${{ secrets.server-password }}
        run: cat ~/.m2/settings.xml && mvn compile --no-transfer-progress

  test:
    name: Test (JUnit)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          # 這裡的 ID 必須與您 pom.xml 裡的 <repository><id>...</id></repository> 完全一致
          server-id: github
          # server-username / server-password 要填「環境變數名稱」，不是秘密值本身
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Run JUnit tests
        env:
          MAVEN_USERNAME: ${{ secrets.server-username }}
          MAVEN_PASSWORD: ${{ secrets.server-password }}
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
