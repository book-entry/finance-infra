name: Reusable — Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"
      server-username:
        type: string
        required: true
      server-password:
        type: string
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version:
            ${{ inputs.java-version }}
            # 1. 這裡的 ID 必須與您 pom.xml 裡的 <repository><id>...</id></repository> 完全一致
          server-id: github
          # 2. 透過這兩個設定，setup-java 會自動幫您寫入臨時產生的 settings.xml
          server-username: ${{ inputs.server-username }}
          server-password: ${{ inputs.server-password }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile --no-transfer-progress

  test:
    name: Test (JUnit)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Run JUnit tests
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGE_USER }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
