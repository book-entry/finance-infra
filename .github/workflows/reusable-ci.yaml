name: Reusable — Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Debug Settings XML
        run: cat ./settings.xml

      - name: Test Token with Curl
        env:
          USER: ${{ secrets.PACKAGE_USER }}
          TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          # 使用你的 Token 嘗試直接下載 Maven 的 metadata 檔案
          curl -v -u "$USER:$TOKEN" https://github.com

      - name: Compile
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGE_USER }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: mvn compile --no-transfer-progress

  test:
    name: Test (JUnit)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Run JUnit tests
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGE_USER }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
