name: Reusable — Build, Push & Deploy to Zeabur

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"
      service-name:
        description: "e.g. finance-gateway — used as the Docker image name"
        type: string
        required: true
    secrets:
      server-username:
        required: true
      server-password:
        required: true
      ZEABUR_API_TOKEN:
        required: true
      ZEABUR_SERVICE_ID:
        required: true
      ZEABUR_ENVIRONMENT_ID:
        required: true

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          # 這裡的 ID 必須與您 pom.xml 裡的 <repository><id>...</id></repository> 完全一致
          server-id: github
          # server-username / server-password 要填「環境變數名稱」，不是秘密值本身
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build jar (skip tests — already passed in CI)
        env:
          MAVEN_USERNAME: ${{ secrets.server-username }}
          MAVEN_PASSWORD: ${{ secrets.server-password }}
        run: mvn package -DskipTests --no-transfer-progress

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}:${{ github.sha }}

      - name: Restart Zeabur service (re-pulls :latest image)
        env:
          ZEABUR_API_TOKEN: ${{ secrets.ZEABUR_API_TOKEN }}
          ZEABUR_SERVICE_ID: ${{ secrets.ZEABUR_SERVICE_ID }}
          ZEABUR_ENVIRONMENT_ID: ${{ secrets.ZEABUR_ENVIRONMENT_ID }}
        run: |
          echo "${ZEABUR_API_TOKEN}"
          echo "${ZEABUR_SERVICE_ID}"
          echo "${ZEABUR_ENVIRONMENT_ID}"s
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST https://api.zeabur.com/graphql \
            -H "Authorization: Bearer ${ZEABUR_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { restartService(serviceID: \\\"${ZEABUR_SERVICE_ID}\\\", environmentID: \\\"${ZEABUR_ENVIRONMENT_ID}\\\") }\"}")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1 | sed 's/HTTP_STATUS://')
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_STATUS"
          echo "Zeabur response body: $BODY"

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Zeabur API returned HTTP $HTTP_STATUS"
            exit 1
          fi

          if echo "$BODY" | grep -q '"errors"'; then
            echo "::error::Zeabur returned GraphQL errors — check the response body above"
            exit 1
          fi

          echo "Zeabur restartService mutation accepted — service will pull :latest and restart."
